name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Catches newly-published CodeQL query patterns even on weeks with no pushes.
    - cron: '19 3 * * 1'

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      # No build step: CodeQL's JS/TS analysis works directly off source, and this
      # repo statically exports (no server runtime) — nothing needs to compile for
      # the queries to run.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
