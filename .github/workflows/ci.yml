name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck + build + lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (static export)
        run: npm run build

      - name: Verify built output is non-empty
        run: |
          test -f out/dashboard/index.html
          test -f out/explore/index.html
          test -f out/onboarding/index.html
          test -f out/send/index.html
          test -f out/swap/index.html
